name: 03-Auto-Release

# /**
#  * Purpose: Create a GitHub release when a new version lands on main.
#  */

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: auto-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version="$(awk -F'"' '
            /^\[workspace.package\]/ { in_workspace_package = 1; next }
            /^\[/ { if (in_workspace_package) exit }
            in_workspace_package && /^version = / { print $2; exit }
          ' Cargo.toml)"
          if [[ -z "$version" ]]; then
            echo "Could not read workspace package version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check release eligibility
        id: release
        run: |
          if [[ "${{ steps.version.outputs.version }}" == *".dev"* ]]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch tags
        run: git fetch --tags

      - name: Check tag
        id: tag
        run: |
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch release workflow
        if: steps.release.outputs.eligible == 'true' && steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --ref main \
            --field version="v${{ steps.version.outputs.version }}"
