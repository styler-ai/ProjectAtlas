name: 01-CI

# /**
#  * Purpose: Run ProjectAtlas linting, tests, and build checks.
#  */

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Issue reference check
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_TITLE="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.title // ""')"
          PR_BODY="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.body // ""')"
          PR_MILESTONE="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.milestone.number // ""')"
          text="$PR_TITLE $PR_BODY"
          if ! [[ "$text" =~ (#[0-9]+|GH-[0-9]+|[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+#[0-9]+) ]]; then
            echo "Pull request title or body must reference a GitHub issue." >&2
            exit 1
          fi
          if [[ -z "$PR_MILESTONE" ]]; then
            echo "Pull request must be assigned to a milestone." >&2
            exit 1
          fi

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Dependency policy
        run: cargo deny check

      - name: Tests
        run: cargo test --workspace --all-features --locked

      - name: Doc tests
        run: cargo test --doc --all-features --locked

      - name: Rustdoc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --all-features --locked

      - name: ProjectAtlas scan
        run: cargo run --locked -p projectatlas-cli -- --format json scan .

      - name: ProjectAtlas parity
        run: cargo run --locked -p projectatlas-cli -- parity report --profile repository-intelligence

      - name: ProjectAtlas lint
        run: cargo run --locked -p projectatlas-cli -- lint --strict-folders --report-untracked

      - name: ProjectAtlas map
        run: cargo run --locked -p projectatlas-cli -- map --force

      - name: ProjectAtlas map diff
        run: git diff --exit-code -- .projectatlas/projectatlas.toon .projectatlas/projectatlas-nonsource-files.toon

  install-smoke:
    name: install-smoke
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install binary
        timeout-minutes: 5
        run: |
          cargo install --path crates/projectatlas-cli --locked
          expected="v$(awk -F'"' '
            /^\[workspace.package\]/ { in_workspace_package = 1; next }
            /^\[/ { if (in_workspace_package) exit }
            in_workspace_package && /^version = / { print $2; exit }
          ' Cargo.toml)"
          PROJECTATLAS_NO_TELEMETRY=1 projectatlas --require-version "$expected" --format json runtime-info
          PROJECTATLAS_NO_TELEMETRY=1 projectatlas config --print
          PROJECTATLAS_NO_TELEMETRY=1 projectatlas ignore list

      - name: Smoke map
        run: |
          mkdir smoke
          cd smoke
          projectatlas init
          projectatlas scan
          projectatlas purpose set . "Smoke test repository root"
          projectatlas map --force
          projectatlas lint --strict-folders --report-untracked

  e2e-smoke:
    name: e2e-smoke ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            os: ubuntu-latest
          - label: windows
            os: windows-latest
          - label: macos-x64
            os: macos-15-intel
          - label: macos-arm64
            os: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Plugin installer E2E
        timeout-minutes: 5
        run: cargo test --locked -p projectatlas-cli plugin_installer_writes_real_harness_configs --test e2e

      - name: MCP project binding E2E
        timeout-minutes: 5
        run: cargo test --locked -p projectatlas-cli mcp_server_stays_bound_to_one_project_database --test e2e
